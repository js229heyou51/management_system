<!DOCTYPE html>
<html>
	<head>
		<title>{$langHtml.common.add}{$langHtml.common.relatedFile} - {$langHtml.common.systemTitle}</title>
		{include file="public/head" /}
		<script type="text/javascript" src="/static/admin/js/pl.js"></script>
	</head>
	<body style="padding:10px; box-sizing: border-box;">
		<form class="layui-form">
			<input type="hidden" name="pl_id" value="{$pl_id??''}">
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.title}</label>
				<div class="layui-input-block">
					<input type="text" class="layui-input" name="title" placeholder="{$langHtml.common.enter}{$langHtml.common.title}" >
				</div>
			</div>
			{if ($confFile.link_url == true)}
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.link}</label>
				<div class="layui-input-block">
					<input type="text" class="layui-input" name="link_url" placeholder="{$langHtml.common.enter}{$langHtml.common.link}" >
				</div>
			</div>
			{/if}
			{if ($confFile.img_sl == true)}
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.picture}</label>
				<div class="layui-input-block">
					<div class="layui-inline">
						<button type="button" class="layui-btn" id="img_sl">{$langHtml.common.uploadImg}</button>
					</div>
					<div class="layui-inline">
						<div class="layui-upload-list" id="add_img_sl">
							
						</div>
					</div>
				</div>
			</div>
			<script type="text/javascript">
				imgUpload('img_sl','{$Request.root}/{$route}/upload_img');
			</script>
			{/if}
			{if($confFile.z_body)}
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.detail}</label>
				<div class="layui-input-block">
					<textarea id="z_body" name="z_body" style="width:100%;height:250px;"></textarea>
				</div>
				<script>
					tinymceEditor('z_body');
				</script>
			</div>
			{/if}
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.file}</label>
				<div class="layui-input-inline">
					<button type="button" class="layui-btn layui-bg-color" id="fil_sl">{$langHtml.common.uploadFile}</button>
				</div>
				<div class="layui-form-mid layui-word-aux"></div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.fileLink}</label>
				<div class="layui-input-block" id="add_fil_sl">
					<div class="upload_file_li"><input type="text" class="layui-input" name="fil_sl" value="" ></div>
				</div>
			</div>
			<script type="text/javascript">
				fileUpload('fil_sl','{$Request.root}/{$route}/upload_file');
			</script>
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.releaseTime}</label>
				<div class="layui-input-block">
					<input type="text" name="wtime" id="wtime" lay-verify="datetime" placeholder="yyyy-MM-dd HH:mm:ss" value="{if(!empty($find.wtime))}{$find.wtime | date='Y-m-d H:i:s'}{else}{:date('Y-m-d H:i:s')}{/if}" autocomplete="off" class="layui-input">
				</div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.sort}</label>
				<div class="layui-input-inline">
					<input type="text" class="layui-input" name="px" placeholder="{$langHtml.common.sort}" value="100" >
				</div>
			</div>


		</form>
		<div class="layui-form-item" style="margin-top:10px;">
			<div class="layui-input-block">
				<button type="button" class="layui-btn layui-bg-color" onclick="pl_save('{$Request.root}/{$route}/pl_file_add')">{$langHtml.common.save}</button>
			</div>
		</div>
	</body>
</html>
{include file="public/footer" /}
