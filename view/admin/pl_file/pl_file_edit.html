<!DOCTYPE html>
<html>
	<head>
		<title>{$langHtml.common.edit}{$langHtml.common.relatedFile} - {$langHtml.common.systemTitle}</title>
		{include file="public/head" /}
		<script type="text/javascript" src="/static/admin/js/pl.js"></script>
	</head>
	<body style="padding:10px; box-sizing: border-box;">
		<form class="layui-form">
			<input type="hidden" name="pl_id" value="{$pl_id??''}">
			<input type="hidden" name="id" value="{$find.id??''}">
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.title}</label>
				<div class="layui-input-block">
					<input type="text" class="layui-input" name="title" placeholder="{$langHtml.common.enter}{$langHtml.common.title}" value="{$find.title??''}">
				</div>
			</div>
			{if ($conf.link_url == true)}
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.link}</label>
				<div class="layui-input-block">
					<input type="text" class="layui-input" name="link_url" placeholder="{$langHtml.common.enter}{$langHtml.common.link}" value="{$find.link_url??''}">
				</div>
			</div>
			{/if}
			{if ($conf.img_sl == true)}
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.picture}</label>
				<div class="layui-input-block">
					<div class="upload-list" id="img_sl_list">
						{if(isset($find.imgList))}
						{volist name="find.imgList" id="item"}
						<div class="upload_pic_li" data-id="{$item.id}"><span onclick="delImg(this,'img_sl')"></span><img src="{$item.path}" alt="" class="layui-upload-img"></div>
						{/volist}
						{/if}
					</div><div class="layui-inline">
						<div class="layui-upload-drag" onclick="uploadTool({elem:'img_sl',url:'{$Request.root}/Gallery/index',type:'image',title:'图片上传'})">
							<i class="layui-icon layui-icon-picture"></i> 
						</div>
					</div>
					<input type="hidden" name="img_sl" id="img_sl" value="{:json_encode($find.img_sl??[])}">
				</div>
			</div>
			{/if}
			{if($conf.z_body)}
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.detail}</label>
				<div class="layui-input-block">
					<textarea id="z_body" name="z_body" style="width:100%;height:250px;">{$find.z_body??''}</textarea>
				</div>
				<script>
					tinymceEditor('z_body');
				</script>
			</div>
			{/if}
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.file}</label>
				<div class="layui-input-inline">
					<button type="button" class="layui-btn layui-bg-color" id="fil_sl">{$langHtml.common.uploadFile}</button>
				</div>
				<div class="layui-form-mid layui-word-aux"></div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.fileLink}</label>
				<div class="layui-input-block" id="add_fil_sl">
					<div class="upload_file_li"><input type="text" class="layui-input" name="fil_sl" value="{$find.fil_sl??''}" ></div>
				</div>
			</div>
			<script type="text/javascript">
				fileUpload('fil_sl','{$Request.root}/{$route}/upload_file');
			</script>
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.releaseTime}</label>
				<div class="layui-input-block">
					<input type="text" name="wtime" id="wtime" lay-verify="datetime" placeholder="yyyy-MM-dd HH:mm:ss" value="{if(!empty($find.wtime))}{$find.wtime | date='Y-m-d H:i:s'}{else}{:date('Y-m-d H:i:s')}{/if}" autocomplete="off" class="layui-input">
				</div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label">{$langHtml.common.sort}</label>
				<div class="layui-input-inline">
					<input type="text" class="layui-input" name="px" placeholder="{$langHtml.common.sort}" value="{$find.px??'100'}" >
				</div>
			</div>


		</form>
		<div class="layui-form-item" style="margin-top:10px;">
			<div class="layui-input-block">
				<button type="button" class="layui-btn layui-bg-color" onclick="pl_save()">{$langHtml.common.save}</button>
			</div>
		</div>
	</body>
</html>
{include file="public/footer" /}
