<!DOCTYPE html>
<html>
	<head>
		<title>{$langHtml.common.systemTitle}</title>
		{include file="public/head" /}
	</head>
	
	<body style="padding:10px; box-sizing: border-box;">
		<div class="layui-wrap">
			<form class="layui-form" id="gForm" lay-filter="gForm">
				<div class="layui-form-item">
					<label class="layui-form-label">上传方式</label>
					<div class="layui-input-block">
						<input type="radio" name="upload_type" value="1" title="本地上传" checked>
						<input type="radio" name="upload_type" value="2" title="网络上传"> 
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">上传至分组</label>
					<div class="layui-input-block">
						<select name="category_id" id="category_id">
							<option value=0>{$langHtml.common.primaryCategory}</option>
							{volist name="category" id="item"}
							<option value="{$key}">{$item}</option>
							{/volist}
						</select>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label" id="layui-form-label">{$langHtml.common.picture}</label>
					<div class="layui-input-block">
						<div class="upload-list layui-hide" id="upload-preview"></div><div class="layui-inline">
							<div class="layui-upload-drag" id="upload-drag">
								<i class="layui-icon layui-icon-addition"></i> 
							</div>
						</div>
					</div>
				</div>
			</form>
			<div class="layui-form-item" style="margin-top:10px;">
				<div class="layui-input-block">
					<button type="button" class="layui-btn layui-bg-color" id="upload-action" >{$langHtml.common.save}</button>
				</div>
			</div>
		</div>
	</body>
</html>
{include file="public/footer" /}
<script type="text/javascript">
	layui.use(function(){
		var form = layui.form;
		layer = layui.layer;
		$ = layui.jquery;
		element = layui.element;
		
		upload.render({
			elem: '#upload-drag',
			multiple: true,
			url: '{$Request.root}/Gallery/upload',
			auto: false,
			bindAction: '#upload-action',
			number: 20,
			data: {
				upload_type: function(){return $('input[name=upload_type]').val()},
				category_id: function(){return $('#category_id option:selected').val()},
			},
			choose: function(obj){
				obj.preview(function(index, file, result){
					$('#upload-preview').removeClass('layui-hide');
					$('#upload-preview').append('<div class="upload_pic_li mb10"><span></span><img src="'+ result +'" alt="'+ file.name +'" class="layui-upload-img"><div class="layui-progress" lay-filter="progress-'+ index +'"><div class="layui-progress-bar" lay-percent=""></div></div></div>');
				})
			},
			allDone: function(obj){ // 多文件上传完毕后的状态回调
				if(obj.total === obj.successful){
					if (typeof window.functionBridge === 'function') {
						window.functionBridge(window.someDataFromParent.category_id);
					}
					var index = parent.layer.getFrameIndex(window.name); // 先得到当前 iframe 层的索引
					parent.layer.close(index); // 再执行关闭
				}
			},
			progress: function(n, elem, e, index){
				$('.layui-progress[lay-filter=progress-'+ index +']').show();
				element.progress('progress-'+ index, n + '%');
			},
			// done: function(res){
				
			// }
		})

		$(document).on('click','#upload-preview .upload_pic_li>span',function(){
			$(this).parent().remove();
		})
	})
</script>
