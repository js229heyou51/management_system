<!DOCTYPE html>
<html>
	<head>
		<title>{$langHtml.common.systemTitle}</title>
		{include file="public/head" /}
	</head>
	
	<body style="padding:10px; box-sizing: border-box;">
		<div class="header" style="margin-bottom:20px;">
			<div></div>
		</div>
		<div class="layui-wrap">
			<div id="layui-info">
				<form class="layui-form">
					<div class="layui-form-item">
						<label class="layui-form-label">用户名</label>
						<div class="layui-input-inline">
							<input type="text" class="layui-input" name="username" placeholder="请输入用户名" value="{$username??''}" readonly>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">原密码</label>
						<div class="layui-input-inline">
							<input type="text" class="layui-input" name="old_password" placeholder="请输入原密码" >
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">新密码</label>
						<div class="layui-input-inline">
							<input type="text" class="layui-input" name="password" placeholder="请输入新密码" >
						</div>
						<div class="layui-form-mid layui-word-aux">6-20位字母+数字+特殊字符</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">确认新密码</label>
						<div class="layui-input-inline">
							<input type="text" class="layui-input" name="confirm_password" placeholder="请输入确认新密码" >
						</div>
						<div class="layui-form-mid layui-word-aux">6-20位字母+数字+特殊字符</div>
					</div>
				</form>
				<div class="layui-form-item" style="margin-top:10px;">
					<div class="layui-input-block">
						<button type="button" class="layui-btn" onclick="save()">保存</button>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
{include file="public/footer" /}
