<!DOCTYPE html>
<html>
	<head>
		<title>{$langHtml.common.systemTitle}</title>
		{include file="public/head" /}
	</head>
	
	<body style="padding:10px; box-sizing: border-box;">
		<div class="layui-wrap">
			<form class="layui-form">
				<input type="hidden" name="id_lm" value="{$find.id??''}">
				<div class="layui-form-item">
					<label class="layui-form-label">{$langHtml.common.category}</label>
					<div class="layui-input-block">
						<select name="parent_id" id="parent_id">
							<option value=0>{$langHtml.common.primaryCategory}</option>
							{volist name="category" id="item"}
							<option value="{$key}" {if(isset($params.id) && $params.id == $key)}selected{/if}>{$item}</option>
							{/volist}
						</select>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">{$langHtml.common.categoryName}</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" name="name" placeholder="{$langHtml.common.enter}{$langHtml.common.categoryName}" value="{$find.name??''}">
					</div>
				</div>
			</form>
			<div class="layui-form-item" style="margin-top:10px;">
				<div class="layui-input-block">
					<button type="button" class="layui-btn layui-bg-color" onclick="save()">{$langHtml.common.save}</button>
				</div>
			</div>
		</div>
	</body>
</html>
{include file="public/footer" /}
