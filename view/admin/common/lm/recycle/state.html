<script type="text/html" id="state">
	{if($conf.lm.tuijian_lm == true)}
	<input type="checkbox" name="tuijian_lm" value="{{d.id_lm}}" lay-skin="switch" lay-text="{$langHtml.common.recommend}|{$langHtml.common.recommend}" lay-filter="tuijian_lm" {{# if(d.tuijian_lm==1){ }} checked {{# } }}>
	{/if}
	{if($conf.lm.hot_lm == true)}
	<input type="checkbox" name="hot_lm" value="{{d.id_lm}}" lay-skin="switch" lay-text="{$langHtml.common.hot}|{$langHtml.common.hot}" lay-filter="hot_lm" {{# if(d.hot_lm==1){ }} checked {{# } }}>
	{/if}
	{if($conf.lm.pass_lm == true)}
	<input type="checkbox" name="pass_lm" value="{{d.id_lm}}" lay-skin="switch" lay-text="{$langHtml.common.shield}|{$langHtml.common.unshielded}" lay-filter="pass_lm" {{# if(d.pass_lm==0){ }} checked {{# } }}>
	{/if}
</script>
