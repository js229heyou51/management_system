<!DOCTYPE html>
<html>
<head>
	{:showseo(1)}
	{include file="public/head"}
</head>
	<body>
		<div class="wrap">
			<!-- header -->
			<!-- header -->
			<!-- main -->
			<div class="main">
				<div class="login">
					<div class="container">
						<div class="login-header">
							<div class="login-top flex">
								<div class="login-logo">
									<img src="/static/index/images/logo.png">
								</div>
								<div class="login-tit">
									<h2>会员注册</h2>
								</div>
							</div>
							<div class="login-tright">
								<a href="/">商城首页</a>
							</div>
						</div>
						<div class="login-con">
							<div class="login-content reg_content">
								<div class="login-box">
									<div class="login-nav">
										<ul class="flex">
											<li class="cur"><a href="#">账号注册</a></li>
										</ul>
									</div>
									<div class="login-inp">
										<form method="post" onsubmit="return false" novalidate="novalidate" id="rform">
											<div class="login-inpbox">
												<div class="login-inpimg"><img src="/static/index/images/login_01.png"></div>
												<input type="text" name="username" id="username" placeholder="邮箱">
											</div>
											<div class="login-inpbox">
												<div class="login-inpimg"><img src="/static/index/images/login_01.png"></div>
												<input type="text" name="smscode" id="smscode" placeholder="验证码">
												<button type="button" class="sign-sms-btn js-sendcode">获取验证码</button>
											</div>
											<div class="login-inpbox">
												<div class="login-inpimg"><img src="/static/index/images/login_02.png"></div>
												<input type="password" name="password" id="password" placeholder="用户密码">
											</div>
											<div class="login-inpbox">
												<div class="login-inpimg"><img src="/static/index/images/login_02.png"></div>
												<input type="password" name="conformpassword" id="conformpassword" placeholder="确认密码">
											</div>
											<div class="login-btn">
												<input type="submit" id="reg_btn" value="点击注册" onclick="register()">
												<!-- <button type="button" id="login_btn">登录</button> -->
											</div>
											<div class="login-mr flex">
												<div class="login-mj"><!-- <a href="">忘记密码？</a> --></div>
												<div class="login-reg"><p>我已注册账号，<a href="/login/">现在登录</a></p></div>
											</div>
										</form>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
			<!-- main -->
			<!-- footer -->
			{include file="public/footer"}
			<!-- footer -->
		</div>
	</body>
</html>
