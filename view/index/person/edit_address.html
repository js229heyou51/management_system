<html>
	<head>
		{include file="public/head"}
		<script src="/static/index/js/distpicker.data.js"></script>
		<script src="/static/index/js/distpicker.min.js"></script>
		<script src="/static/index/js/address.js"></script>
	</head>
	<body>
		<div class="cart-add-box" id="addAddressBox">
			<form action="" id="addForm" class="layui-form">
				<input type="hidden" name="id" value="{$data.id??''}">
				<div class="layui-form-item">
					<label class="layui-form-label">所在省市</label>
					<div class="layui-input-block" id="cart-address-main">
						<div class="layui-input-inline">
							<select class="inp-select" name="province" id="add-province" data-province="" lay-filter="province" value="{$data.province??''}"></select>
						</div>
						<div class="layui-input-inline">
							<select class="inp-select" name="city" id="add-city" data-city="" lay-filter="city" value="{$data.city??''}"></select>
						</div>
						<div class="layui-input-inline">
							<select class="inp-select" name="district" id="add-county" data-district="" lay-filter="district" value="{$data.district??''}"></select>
						</div>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">详细地址</label>
					<div class="layui-input-block">
						<input type="text" name="address" value="{$data.address??''}" class="layui-input" placeholder="建议您如实填写详细收货地址，例如街道名称、门牌号码、楼层和房间号等信息">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">收货人</label>
					<div class="layui-input-block">
						<input type="text" name="rename" value="{$data.rename??''}" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">手机号码</label>
					<div class="layui-input-block">
						<input type="text" name="phone" value="{$data.phone??''}" class="layui-input" placeholder="手机号码必填">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label"></label>
					<div class="layui-input-block">
						<input type="checkbox" name="type" {if(isset($data.type) && $data.type == 1)}checked{/if} class="layui-input" lay-skin="primary" value="1" title="默认地址">
					</div>
				</div>
				<div class="layui-form-item">
					<div class="layui-input-block">
						<button class="layui-btn layui-btn-normal" type="button" onclick="saveAddress('{$type??''}')">保存</button>
					</div>
				</div>
			</form>
		</div>
	</body>
</html>
<script>
	layui.use(['layer','form'],function(){
		$ = layui.jquery;
		var form = layui.form;
		layer = layui.layer;
		var data = {:json_encode($data)};
		$.each(data, function(index, value) {	
			$('#addForm').find('input[name='+index+']').val(value);
			$('#addForm').find('select[name='+index+']').val(value);
			$('#addForm').find('select[name='+index+']').data(index,value);
		})
		form.render('select');
		init('cart-address-main','');
	})
</script>
